name: Deploy

on:
    push:
        # tags:
        #     - '*'

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
          - working-directory: 'website'
        steps:
            - uses: actions/checkout@v1
            - uses: actions/setup-node@v1
              with:
                  node-version: 12
                  registry-url: https://registry.npmjs.org/
            - run: cd website
            - run: ls
              working-directory: ${{env.working-directory}}
            - run: yarn install
              working-directory: ${{env.working-directory}}
            - run: yarn build
              working-directory: ${{env.working-directory}} 
            - run: git config --global user.email "PaygreenBot@paygreen.fr"
            - run: git config --global user.name "PaygreenBot"
            - run: USE_SSH=true npm run deploy
              working-directory: ${{env.working-directory}}